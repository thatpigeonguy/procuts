<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/styles.css" rel="stylesheet">
    <title>Procuts - Home</title>
    <link rel="icon" type="image/x-icon" href="/assets/img/favicon.webp">
    <script src="https://kit.fontawesome.com/13ff0f7bf5.js" crossorigin="anonymous"></script>
</head>
<body class="index">
    <div id="header"></div>

    <main>
        <div class="slideshow-container">
            <!-- The slides will be dynamically injected here -->
        </div>
    
        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    
        <!-- Dots at the bottom of the slideshow -->
        <div class="dots-container">
            <!-- The dots will be dynamically injected here -->
        </div>
    </main>

    <div id="footer"></div>

    <script src="slideshow.js"></script>

</body>
</html>
